<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Đăng ký nâng cấp</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.field{
margin-bottom:15px;
}

input{
padding:6px;
}

.error{
color:red;
font-size:13px;
display:none;
}

.valid{
border:2px solid green;
}

.invalid{
border:2px solid red;
}

/* password strength */

#strengthBar{
height:8px;
width:200px;
background:#ddd;
margin-top:5px;
}

#strengthLevel{
height:8px;
width:0%;
background:red;
}

/* counter */

#nameCount{
font-size:12px;
color:gray;
}

/* toggle button */

.toggle{
cursor:pointer;
margin-left:5px;
}

</style>

</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="form">

<div class="field">

<label>Họ tên</label><br>

<input id="fullname" maxlength="50">

<div id="nameCount">0/50</div>

<span class="error" id="fullnameError"></span>

</div>


<div class="field">

<label>Email</label><br>

<input id="email">

<span class="error" id="emailError"></span>

</div>


<div class="field">

<label>Mật khẩu</label><br>

<input type="password" id="password">

<span class="toggle" onclick="togglePassword()">👁</span>

<div id="strengthBar">
<div id="strengthLevel"></div>
</div>

<span class="error" id="passwordError"></span>

</div>


<div class="field">

<label>Xác nhận mật khẩu</label><br>

<input type="password" id="confirm">

<span class="error" id="confirmError"></span>

</div>


<button type="submit">Đăng ký</button>

</form>

<p id="success"></p>


<script>

/* regex */

const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;


/* helper */

function showError(id,msg){

let e=document.getElementById(id+"Error");

e.textContent=msg;

e.style.display="block";

document.getElementById(id).classList.add("invalid");

}

function clearError(id){

let e=document.getElementById(id+"Error");

e.style.display="none";

document.getElementById(id).classList.remove("invalid");

document.getElementById(id).classList.add("valid");

}


/* name counter */

fullname.addEventListener("input",function(){

let len=this.value.length;

nameCount.textContent=len+"/50";

});


/* validate name */

function validateName(){

let v=fullname.value.trim();

if(v.length<3){

showError("fullname","Tên phải ≥3 ký tự");

return false;

}

clearError("fullname");

return true;

}


/* validate email */

function validateEmail(){

let v=email.value.trim();

if(!emailRegex.test(v)){

showError("email","Email không hợp lệ");

return false;

}

clearError("email");

return true;

}


/* validate password */

function validatePassword(){

let v=password.value;

if(v.length<8){

showError("password","Mật khẩu ≥8 ký tự");

return false;

}

clearError("password");

return true;

}


/* confirm */

function validateConfirm(){

if(confirm.value!==password.value){

showError("confirm","Mật khẩu không khớp");

return false;

}

clearError("confirm");

return true;

}


/* strength bar */

password.addEventListener("input",function(){

let v=this.value;
let score=0;

if(v.length>=8) score++;

if(/[A-Z]/.test(v)) score++;

if(/[0-9]/.test(v)) score++;

if(/[^A-Za-z0-9]/.test(v)) score++;

let bar=document.getElementById("strengthLevel");

if(score<=1){

bar.style.width="33%";

bar.style.background="red";

}

else if(score<=3){

bar.style.width="66%";

bar.style.background="orange";

}

else{

bar.style.width="100%";

bar.style.background="green";

}

});


/* toggle password */

function togglePassword(){

let p=document.getElementById("password");

if(p.type==="password")

p.type="text";

else

p.type="password";

}


/* blur validate */

fullname.addEventListener("blur",validateName);

email.addEventListener("blur",validateEmail);

password.addEventListener("blur",validatePassword);

confirm.addEventListener("blur",validateConfirm);


/* submit */

form.addEventListener("submit",function(e){

e.preventDefault();

let ok=

validateName() &

validateEmail() &

validatePassword() &

validateConfirm();

if(ok){

form.style.display="none";

success.innerHTML="Đăng ký thành công 🎉";

}

});

</script>

</body>
</html>
